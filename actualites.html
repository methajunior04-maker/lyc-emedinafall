<header class="banner" role="banner">
    <div class="banner-content">
        <img src="images/logo.png" alt="Logo" class="logo">

<main id="main">
<section class="section">
    <h2>À la une</h2>

    <ul id="news-list" class="list" aria-live="polite"></ul>

</section>

<section class="section" id="document">
    <h2>Document</h2>
    <div class="pdf-embed">
        <object data="DOC actualite.pdf" type="application/pdf" width="100%" height="700">
            <p>Votre navigateur ne peut pas afficher les PDF. <a href="DOC actualite.pdf" target="_blank" rel="noopener">Télécharger le document</a>.</p>
        </object>
    </div>
</section>

<script>
// Génère la liste d'articles pour la section «À la une».
(function(){
    const articles = [
        {
            title: 'Info urgente',
            excerpt: "Résumé : Document officiel disponible — consultez le PDF ci‑dessous pour le texte complet.",
            link: '#document'
        },
        {
            title: 'International',
            excerpt: 'Les événements majeurs dans le monde.',
            link: 'blog.html'
        },
        {
            title: 'Économie',
            excerpt: 'Analyses et tendances économiques.',
            link: 'blog.html'
        }
    ];

    const list = document.getElementById('news-list');
    if(!list) return;
    articles.forEach(a=>{
        const li = document.createElement('li');
        li.innerHTML = `
            <h3>${a.title}</h3>
            <p>${a.excerpt}</p>
            <p><a class="btn btn-outline" href="${a.link}">Lire</a></p>
        `;
        list.appendChild(li);
    });
})();
</script>

</main>
